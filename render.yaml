databases:
  - name: downloadvid-db
    plan: free

services:
  - type: web
    name: downloadvid
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn run:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: downloadvid-db
          property: connectionString