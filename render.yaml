services:
  - type: web
    name: downloadvid
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: gunicorn "app:create_app()"

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        sync: false